name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install build tools with dx
        run: sdkmanager "build-tools;30.0.3"
      - name: Download and DEX-ify ECJ jar
        run: |
          mkdir -p app/src/main/assets /tmp/ecj_dex

          # ECJ 3.26.0 - compiled targeting Java 8 (class file version 52.0)
          # dx tool from build-tools 30.0.3 only supports up to Java 8 (version 52.0)
          # Newer ECJ versions (3.27+) use Java 11 (version 55.0) which dx rejects
          curl -L "https://repo1.maven.org/maven2/org/eclipse/jdt/ecj/3.26.0/ecj-3.26.0.jar" -o ecj.jar

          # Verify class file version (should show 52.0 = Java 8)
          javap -verbose -cp ecj.jar org.eclipse.jdt.internal.compiler.batch.Main 2>/dev/null | grep "major version" || true

          # Convert ECJ to DEX
          $ANDROID_SDK_ROOT/build-tools/30.0.3/dx --dex --output=/tmp/ecj_dex/classes.dex ecj.jar

          # Package DEX into zip (Android won't compress .zip assets)
          zip app/src/main/assets/ecj.zip -j /tmp/ecj_dex/classes.dex

          # dx tool for DEX conversion of compiled .class files
          curl -L "https://repo1.maven.org/maven2/com/google/android/tools/dx/1.7/dx-1.7.jar" -o app/src/main/assets/dx.zip

          # Android SDK jar for compilation bootstrap
          curl -L "https://github.com/Reginer/aosp-android-jar/raw/main/android-28/android.jar" -o app/src/main/assets/android.zip

          ls -lh app/src/main/assets/
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APKBuilder
          path: app/build/outputs/apk/debug/app-debug.apk
